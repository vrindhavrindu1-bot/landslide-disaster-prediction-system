<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
</head>
<body>

<h2>Register</h2>

<input type="text" id="regUser" placeholder="Username"><br><br>
<input type="password" id="regPass" placeholder="Password"><br><br>

<button onclick="register()">Register</button>

<p id="msg" style="color:green;"></p>

<script>
function register() {

    var user = document.getElementById("regUser").value.trim();
    var pass = document.getElementById("regPass").value.trim();

    if(user === "" || pass === ""){
        document.getElementById("msg").innerText = "Fill all fields";
        return;
    }

    var users = JSON.parse(localStorage.getItem("users")) || [];

    var exists = users.find(u => u.username === user);

    if(exists){
        document.getElementById("msg").innerText = "Username already exists";
        return;
    }

    users.push({
        username: user,
        password: pass
    });

    localStorage.setItem("users", JSON.stringify(users));

    document.getElementById("msg").innerText = "Registered Successfully ✅";
setTimeout(function(){
    window.location.href = "index.html";
},2000);
}
</script>

</body>
</html>
